name: API Contract Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  api-contract:
    name: API Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "install=pnpm install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "run=pnpm run" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "install=yarn install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "run=yarn run" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "install=npm ci" >> $GITHUB_OUTPUT
            echo "run=npm run" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.detect-pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
            ~/.npm
            ~/.yarn/cache
          key: ${{ runner.os }}-${{ steps.detect-pm.outputs.manager }}-${{ hashFiles('**/pnpm-lock.yaml', '**/yarn.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.detect-pm.outputs.manager }}-

      - name: Install dependencies (PR branch)
        run: ${{ steps.detect-pm.outputs.install }}

      - name: Read config
        id: config
        run: |
          if [ -f ".github/api-contract.yml" ]; then
            SCRIPT=$(yq -r '.["api-contract"].generate_script // "generate:openapi"' .github/api-contract.yml)
            OUTPUT=$(yq -r '.["api-contract"].openapi_output // "openapi/schema.json"' .github/api-contract.yml)
            API_PATH=$(yq -r '.["api-contract"].monorepo.api_path // "."' .github/api-contract.yml)
            MONOREPO=$(yq -r '.["api-contract"].monorepo.enabled // "false"' .github/api-contract.yml)
          else
            SCRIPT="generate:openapi"
            OUTPUT="openapi/schema.json"
            API_PATH="."
            MONOREPO="false"
          fi
          echo "script=$SCRIPT" >> $GITHUB_OUTPUT
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          echo "api_path=$API_PATH" >> $GITHUB_OUTPUT
          echo "monorepo=$MONOREPO" >> $GITHUB_OUTPUT

      - name: Generate PR OpenAPI schema
        working-directory: ${{ steps.config.outputs.monorepo == 'true' && steps.config.outputs.api_path || '.' }}
        run: ${{ steps.detect-pm.outputs.run }} ${{ steps.config.outputs.script }}

      - name: Save PR schema
        run: |
          mkdir -p /tmp/api-contract
          cp ${{ steps.config.outputs.output }} /tmp/api-contract/pr-schema.json

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: false

      - name: Install dependencies (base branch)
        run: ${{ steps.detect-pm.outputs.install }}

      - name: Generate base OpenAPI schema
        working-directory: ${{ steps.config.outputs.monorepo == 'true' && steps.config.outputs.api_path || '.' }}
        run: ${{ steps.detect-pm.outputs.run }} ${{ steps.config.outputs.script }}

      - name: Save base schema
        run: cp ${{ steps.config.outputs.output }} /tmp/api-contract/base-schema.json

      - name: Checkout PR branch again
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Run API Contract Probot
        uses: ./.github/actions/api-contract-probot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PR_SCHEMA_PATH: /tmp/api-contract/pr-schema.json
          BASE_SCHEMA_PATH: /tmp/api-contract/base-schema.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-schemas
          path: |
            /tmp/api-contract/pr-schema.json
            /tmp/api-contract/base-schema.json
            quality-reports/
          retention-days: 7
